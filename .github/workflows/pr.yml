name: PR checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-test-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy packages services apps scripts evals

      - name: Pytest
        run: pytest -q

      - name: Generate synthetic corpora
        run: |
          python data/generators/generate_corpus.py
          python data/generators/generate_telemetry.py

      - name: Run FieldForge Docs evaluation suite
        run: python scripts/run_eval.py

      - name: Quality gate — Docs guardrail eval must stay at 100%
        run: python scripts/check_guardrail_gate.py

      - name: Run FieldForge Copilot evaluation suite
        run: python scripts/run_copilot_eval.py

      - name: Run FieldForge Mesh evaluation suite
        run: python scripts/run_mesh_eval.py

      - name: Ingest eval reports into FieldForge Ops and run the quality gate
        run: |
          uvicorn fieldforge_ops_api.main:app --port 8030 &
          for i in $(seq 1 20); do curl -sf http://localhost:8030/health && break; sleep 0.5; done
          python scripts/ingest_eval_reports.py --ops-url http://localhost:8030

      - name: Docker build — Docs API
        run: docker build -f infra/docker/docs_api.Dockerfile -t fieldforge-docs-api:pr .

      - name: Docker build — Copilot API
        run: docker build -f infra/docker/copilot_api.Dockerfile -t fieldforge-copilot-api:pr .

      - name: Docker build — Mesh Telemetry Analyst
        run: docker build -f infra/docker/mesh_telemetry_agent.Dockerfile -t fieldforge-mesh-telemetry-agent:pr .

      - name: Docker build — Mesh Incident Commander
        run: docker build -f infra/docker/mesh_commander.Dockerfile -t fieldforge-mesh-commander:pr .

      - name: Docker build — Ops API
        run: docker build -f infra/docker/ops_api.Dockerfile -t fieldforge-ops-api:pr .
