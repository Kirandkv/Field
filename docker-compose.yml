# FieldForge AI Suite — slice 1. No Postgres/Qdrant/Redis dependency yet (see
# ADR 0001 and docs/ROADMAP.md — those land at milestone M2).
services:
  docs_api:
    build:
      context: .
      dockerfile: infra/docker/docs_api.Dockerfile
    ports:
      - "8000:8000"
    environment:
      - FIELDFORGE_OPS_TRACE_URL=http://ops_api:8030
    volumes:
      - docs_api_data:/data

  copilot_api:
    build:
      context: .
      dockerfile: infra/docker/copilot_api.Dockerfile
    ports:
      - "8010:8010"
    environment:
      - FIELDFORGE_DOCS_API_URL=http://docs_api:8000
      - FIELDFORGE_OPS_TRACE_URL=http://ops_api:8030
    depends_on:
      - docs_api
    volumes:
      - copilot_api_data:/data

  ops_api:
    build:
      context: .
      dockerfile: infra/docker/ops_api.Dockerfile
    ports:
      - "8030:8030"
    volumes:
      - ops_api_data:/data

  mesh_telemetry_agent:
    build:
      context: .
      dockerfile: infra/docker/mesh_telemetry_agent.Dockerfile
    ports:
      - "8021:8021"
    environment:
      - FIELDFORGE_TELEMETRY_AGENT_URL=http://mesh_telemetry_agent:8021
      - FIELDFORGE_OPS_TRACE_URL=http://ops_api:8030

  mesh_commander:
    build:
      context: .
      dockerfile: infra/docker/mesh_commander.Dockerfile
    ports:
      - "8022:8022"
    environment:
      - FIELDFORGE_OPS_TRACE_URL=http://ops_api:8030
    depends_on:
      - mesh_telemetry_agent
    volumes:
      - mesh_commander_data:/data

volumes:
  docs_api_data:
  copilot_api_data:
  mesh_commander_data:
  ops_api_data:
